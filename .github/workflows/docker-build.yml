name: Build and Push Multi-Registry

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME_BACKEND: jmcl-backend
  IMAGE_NAME_FRONTEND: jmcl-frontend

jobs:
  backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v3
        if: vars.DOCKERHUB_USERNAME != ''
        with:
          registry: docker.io
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: |
            ghcr.io/open-code-studio/${{ env.IMAGE_NAME_BACKEND }}
          tags: |
            type=raw,value=latest
            type=sha

      - uses: docker/build-push-action@v5
        with:
          context: ./backend-core
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Push to Docker Hub (mirror)
        if: vars.DOCKERHUB_USERNAME != ''
        run: |
          docker pull ghcr.io/open-code-studio/${{ env.IMAGE_NAME_BACKEND }}:latest
          docker tag ghcr.io/open-code-studio/${{ env.IMAGE_NAME_BACKEND }}:latest \
            docker.io/open-code-studio/${{ env.IMAGE_NAME_BACKEND }}:latest
          docker push docker.io/open-code-studio/${{ env.IMAGE_NAME_BACKEND }}:latest

  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v3
        if: vars.DOCKERHUB_USERNAME != ''
        with:
          registry: docker.io
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: |
            ghcr.io/open-code-studio/${{ env.IMAGE_NAME_FRONTEND }}
          tags: |
            type=raw,value=latest
            type=sha

      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Push to Docker Hub (mirror)
        if: vars.DOCKERHUB_USERNAME != ''
        run: |
          docker pull ghcr.io/open-code-studio/${{ env.IMAGE_NAME_FRONTEND }}:latest
          docker tag ghcr.io/open-code-studio/${{ env.IMAGE_NAME_FRONTEND }}:latest \
            docker.io/open-code-studio/${{ env.IMAGE_NAME_FRONTEND }}:latest
          docker push docker.io/open-code-studio/${{ env.IMAGE_NAME_FRONTEND }}:latest
